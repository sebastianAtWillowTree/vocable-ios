"project_id": ${{ fromJSON(secrets.CROWDIN_PROJECT_ID) }}
"api_token": ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
"base_path": "."

"preserve_hierarchy": true

"files": [
  {
    "source": "Vocable/**/*.xcstrings",
    "ignore": [
      "CrowdinExport"
    ],
    "translation": "CrowdinExport/%osx_locale%/%file_name%.xliff"
  }
]

"bundles": [
  6
]
