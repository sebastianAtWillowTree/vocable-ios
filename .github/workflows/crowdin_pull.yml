name: Pull Translations From Crowdin
on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  synchronize-with-crowdin:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Crowdin CLI
        run: brew install crowdin
        shell: sh

      - name: Set Project ID as Integer
        run: |
          echo "CROWDIN_PROJECT_ID=$((CROWDIN_PROJECT_ID))" >> $GITHUB_ENV
        env:
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
        
      - name: Download Translations
        run: crowdin bundle download 13 --project-id=834156 --token=84079ca8898375f652f3723b83c4da9cbdefdcd551841902bafa2341fc518efb686878a66ebb3f60
        shell: sh
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            CROWDIN_PROJECT_ID: 834156
            CROWDIN_PERSONAL_TOKEN: 84079ca8898375f652f3723b83c4da9cbdefdcd551841902bafa2341fc518efb686878a66ebb3f60

      - name: Set up Ruby environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.1
          
      - name: Install bundler
        run: gem install bundler
            
      - name: Install dependencies
        run: bundle install
    
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Import XLIFFs to project
        uses: ./.github/actions/run_lane
        with:
          lane: xliff_import

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CROWDIN_PR_BOT_TOKEN }}
          commit-message: Update Localizations
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: crowdin/update-translations-bot
          base: develop
          delete-branch: true
          add-paths: |
            Vocable/**/*.xcstrings
            Vocable/**/*.strings
          title: '[CI] Update Localizations'
          body: |
            Automated localization update from Crowdin.
          labels: |
            localization
            automated
          draft: false
