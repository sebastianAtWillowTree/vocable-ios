name: Test Download Minimal
on: workflow_dispatch

jobs:
  test-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Crowdin CLI (direct download)
        run: |
          # Download Crowdin CLI directly without apt-get
          echo "Downloading Crowdin CLI..."
          curl -L https://github.com/crowdin/crowdin-cli/releases/download/4.2.0/crowdin-cli.zip -o crowdin.zip
          unzip -q crowdin.zip
          chmod +x crowdin-cli/crowdin.jar
          
          # Create wrapper script
          cat > /tmp/crowdin << 'EOF'
          #!/bin/bash
          java -jar $(dirname $0)/../crowdin-cli/crowdin.jar "$@"
          EOF
          chmod +x /tmp/crowdin
          
          # Test it works
          /tmp/crowdin --version
          
      - name: Download Translations
        run: |
          /tmp/crowdin bundle download 19 \
            --project-id=${{ vars.CROWDIN_PROJECT_ID }} \
            --token=${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        
      - name: Check Downloaded Files
        run: |
          echo "=== Looking for export directories ==="
          ls -la | grep -i crowdin || echo "No Crowdin directories found"
          echo ""
          echo "=== Checking for xcstrings files ==="
          find . -name "*.xcstrings" -type f 2>/dev/null | head -10
          echo ""
          echo "=== Directory contents ==="
