name: Pull Translations From Crowdin
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'macos-latest'
        type: choice
        options:
          - macos-latest
          - self-hosted

jobs:
  synchronize-with-crowdin:
    runs-on: ${{ inputs.runner || vars.RUNNER_TYPE || 'macos-latest' }}
    steps:

      - name: Debug - Show runner info
        run: |
          echo "=== Runner Information ==="
          echo "Runner: ${{ runner.name }}"
          echo "OS: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"
          echo "Temp directory: ${{ runner.temp }}"
          echo "Workspace: ${{ github.workspace }}"
          echo "=========================="
        shell: sh

      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Crowdin CLI
        run: |
          if ! command -v crowdin &> /dev/null; then
            echo "Installing Crowdin CLI..."
            brew install crowdin
          else
            echo "Crowdin CLI already installed"
          fi
        shell: sh

      - name: Set Project ID as Integer
        run: |
          echo "CROWDIN_PROJECT_ID=$((CROWDIN_PROJECT_ID))" >> $GITHUB_ENV
        env:
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}

      - name: Download Translations
        run: |
          # Now using v4.11.0 which supports bundle download
          crowdin bundle download 19 \
            --project-id=$CROWDIN_PROJECT_ID \
            --token=$CROWDIN_PERSONAL_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ env.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Debug - Check downloaded files
        run: |
          echo "=== Checking if CrowdinExport directory exists ==="
          if [ -d "CrowdinExport" ]; then
            echo "✓ CrowdinExport directory exists"
            echo ""
            echo "=== Directory structure ==="
            ls -R CrowdinExport/
            echo ""
            echo "=== xcstrings file count ==="
            find CrowdinExport -name "*.xcstrings" | wc -l
            echo ""
          else
            echo "✗ CrowdinExport directory does NOT exist"
            echo "Bundle download may have failed or returned no files"
          fi
        shell: sh

      - name: Set up Ruby environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.1
          
      - name: Install bundler
        run: gem install bundler
            
      - name: Install dependencies
        run: bundle install
    
      - name: Install SwiftLint
        run: brew install swiftlint
        shell: sh

      - name: Import translations to project
        uses: ./.github/actions/run_lane
        with:
          # Use xcstrings_import for xcstrings bundles, xliff_import for XLIFF bundles
          lane: xcstrings_import

      - name: Debug - Check for changes after import
        run: |
          echo "=== Git diff summary ==="
          git diff --stat
          echo ""
          echo "=== Detailed changes in xcstrings files ==="
          git diff --name-only | grep -E '\.(xcstrings|strings)$' || echo "No xcstrings/strings files changed"
          echo ""
          echo "=== Full git status ==="
          git status
        shell: sh

      - name: Stage localization changes
        run: |
          echo "=== Files in CrowdinExport ==="
          ls -R CrowdinExport/
          echo ""
          echo "=== Git status before staging ==="
          git status
          echo ""
          echo "=== Looking for changed xcstrings/strings files ==="
          find Vocable -name "*.xcstrings" -o -name "*.strings" | head -20
          echo ""
          echo "=== Staging all changes in Vocable directory ==="
          git add Vocable/
          echo ""
          echo "=== Git status after staging ==="
          git status
        shell: sh

      - name: Debug - Check for changes after import
        run: |
          echo "=== Git diff summary ==="
          git diff --stat
          echo ""
          echo "=== Detailed changes in xcstrings files ==="
          git diff --name-only | grep -E '\.(xcstrings|strings)$' || echo "No xcstrings/strings files changed"
          echo ""
          echo "=== Full git status ==="
          git status
        shell: sh

      - name: Stage localization changes
        run: |
          echo "=== Files in CrowdinExport ==="
          ls -R CrowdinExport/
          echo ""
          echo "=== Git status before staging ==="
          git status
          echo ""
          echo "=== Looking for changed xcstrings/strings files ==="
          find Vocable -name "*.xcstrings" -o -name "*.strings" | head -20
          echo ""
          echo "=== Staging all changes in Vocable directory ==="
          git add Vocable/
          echo ""
          echo "=== Git status after staging ==="
          git status
        shell: sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update Localizations
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: crowdin/update-translations-bot
          base: develop
          delete-branch: true
          add-paths: |
            Vocable/**/*.xcstrings
            Vocable/**/*.strings
          title: '[CI] Update Localizations'
          body: |
            Automated localization update from Crowdin.
          labels: |
            localization
            automated
          draft: false
