name: 'Run fastlane with artifacts'
on:
  workflow_call:
    inputs:
      lane:
        required: true
        type: string  
jobs:
  run-fastlane:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 'Run fastlane'
        run: bundle exec fastlane ${{ inputs.lane }}

      - name: 'Upload artifacts'
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with: 
          name: 'test-output'
          path: artifacts
