"project_id_env": "CROWDIN_PROJECT_ID"
"api_token_env": ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
"base_path": "."

"preserve_hierarchy": true

"files": [
  {
    "source": "Vocable/**/*.xcstrings",
    "ignore": [
      "CrowdinExport"
    ],
    "translation": "CrowdinExport/%osx_locale%/%file_name%.xliff"
  }
]

"bundles": [
  6
]
