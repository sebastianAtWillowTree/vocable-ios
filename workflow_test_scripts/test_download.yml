name: Test Download Only
on: workflow_dispatch

jobs:
  test-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Crowdin CLI (mimicking Homebrew)
        run: |
          # Install Java 17 (required for Crowdin CLI v4.11+)
          echo "Installing Java 17..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jre-headless > /dev/null
          
          # Set Java 17 as default
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          java -version
          
          # Download and install Crowdin CLI v4.11.0 (same as Homebrew formula)
          echo "Installing Crowdin CLI v4.11.0..."
          curl -sL https://github.com/crowdin/crowdin-cli/releases/download/4.11.0/crowdin-cli.zip -o crowdin.zip
          unzip -q crowdin.zip
          
          # Install to /usr/local (same location as Homebrew)
          sudo mkdir -p /usr/local/lib/crowdin
          sudo cp -r 4.11.0/* /usr/local/lib/crowdin/
          
          # Create executable wrapper (same as Homebrew)
          sudo tee /usr/local/bin/crowdin > /dev/null << 'EOF'
          #!/bin/bash
          exec java -jar /usr/local/lib/crowdin/crowdin-cli.jar "$@"
          EOF
          sudo chmod +x /usr/local/bin/crowdin
          
          # Verify
          crowdin --version
          
      - name: Download Translations
        run: |
          # Now using v4.11.0 which supports bundle download
          crowdin bundle download 19 \
            --project-id=$CROWDIN_PROJECT_ID \
            --token=$CROWDIN_PERSONAL_TOKEN
        
      - name: Check Downloaded Files
        run: |
          echo "=== Looking for export directories ==="
          ls -la | grep -i crowdin || echo "No Crowdin directories found"
          echo ""
          echo "=== Checking for xcstrings files ==="
          find . -name "*.xcstrings" -type f 2>/dev/null | head -10
          echo ""
          echo "=== Directory contents ==="
          if [ -d "CrowdinExport" ]; then
            echo "Found CrowdinExport/"
            ls -R CrowdinExport/
          elif [ -d "CrowdinExports" ]; then
            echo "Found CrowdinExports/"
            ls -R CrowdinExports/
          else
            echo "No export directory found"
          fi
