name: Pull Translations From Crowdin

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  download-translations:
    runs-on: ubuntu-latest  # Changed from macos-14 to ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin Action
        uses: crowdin/github-action@v1
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          export_only_approved: false
          localization_branch_name: crowdin/update-translations-bot
          create_pull_request: false
          push_translations: false
          crowdin_branch_name: develop
          config: 'crowdin.yml'
          debug: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

  process-translations:
    needs: download-translations
    runs-on: macos-14  # Keep macOS runner for iOS-specific tasks
    if: needs.download-translations.outputs.changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Ruby environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.1
          
      - name: Install bundler
        run: gem install bundler
            
      - name: Install dependencies
        run: bundle install

      - name: Import XLIFFs to project
        uses: ./.github/workflows/actions/run_lane
        with:
          lane: xliff_import

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CROWDIN_PR_BOT_TOKEN }}
          commit-message: Update Localizations
          branch: crowdin/update-translations-bot
          base: develop
          delete-branch: true
          title: '[CI] Update Localizations'
          body: 'Automated localization update from Crowdin'
          labels: |
            localization
            automated
